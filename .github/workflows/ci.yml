name: Schema Migration Check

on:
  push:
    branches:
      - '**'        
  pull_request:
    branches:
      - '**'        
  workflow_dispatch: 

jobs:
  migrate-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "**/uv.lock"

      - name: Set up Python
        run: uv python install 3.11

      - name: Install Dependencies
        run: uv sync --frozen

      - name: Run Schema Migration Report
        env:
          PYTHONPATH: .
        run: |
          uv run pytest tests/migrate_test.py